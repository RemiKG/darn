<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0">
  <!-- Darn. defect-menu icons — 28px line style, ink + exactly one amber element each.
       Use: <svg width="28" height="28" viewBox="0 0 28 28"><use href="defect-icons.svg#defect-checkout-null"/></svg> -->

  <!-- 1 · The checkout null — cart with a dashed void where the item should be -->
  <symbol id="defect-checkout-null" viewBox="0 0 28 28">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <g stroke="#1B2A44" stroke-width="1.7">
        <path d="M2.5 5.5h2.9l2.45 11h12.4l2.25-7.5H6.7"/>
        <circle cx="10.4" cy="21.6" r="1.9"/>
        <circle cx="18.6" cy="21.6" r="1.9"/>
      </g>
      <circle cx="14.6" cy="12.7" r="2.7" stroke="#A9690F" stroke-width="1.7" stroke-dasharray="2.6 2.3"/>
    </g>
  </symbol>

  <!-- 2 · The catalog stampede — query chevrons hammering a database -->
  <symbol id="defect-catalog-stampede" viewBox="0 0 28 28">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <g stroke="#1B2A44" stroke-width="1.7">
        <path d="M11.5 7.4v11.2c0 1.45 2.3 2.5 5.1 2.5s5.1-1.05 5.1-2.5V7.4"/>
        <path d="M11.5 13.2c0 1.45 2.3 2.5 5.1 2.5s5.1-1.05 5.1-2.5"/>
        <path d="m5.4 6.8 2.6 2.4-2.6 2.4"/>
        <path d="m2.2 11.6 2.6 2.4-2.6 2.4"/>
        <path d="m5.4 16.4 2.6 2.4-2.6 2.4"/>
      </g>
      <ellipse cx="16.6" cy="7.4" rx="5.1" ry="2.3" stroke="#E8A33D" stroke-width="1.7"/>
    </g>
  </symbol>

  <!-- 3 · The penny shaver — a cent sign with a shaved-off amber sliver -->
  <symbol id="defect-penny-shaver" viewBox="0 0 28 28">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <g stroke="#1B2A44" stroke-width="1.7">
        <path d="M15.8 8.11a7.4 7.4 0 1 0 0 12.18Z"/>
        <path d="M13.4 12.3a2.7 2.7 0 1 0 0 3.9"/>
        <path d="M11.9 10.4v7.6"/>
      </g>
      <path d="M19.7 8.9a8.5 8.5 0 0 1 0 10.6" stroke="#E8A33D" stroke-width="1.9"/>
    </g>
  </symbol>

  <!-- 4 · The inventory grenade — open crate, amber burst above -->
  <symbol id="defect-inventory-grenade" viewBox="0 0 28 28">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <g stroke="#1B2A44" stroke-width="1.7">
        <rect x="6.2" y="12.6" width="13.6" height="9.2" rx="1.6"/>
        <path d="M13 12.6v9.2"/>
        <path d="M6.2 12.6 3.6 9.9M19.8 12.6l2.6-2.7"/>
      </g>
      <g stroke="#E8A33D" stroke-width="1.7">
        <path d="M13 2.4v3.1"/>
        <path d="m9 4 1.9 2.1"/>
        <path d="M17 4l-1.9 2.1"/>
        <path d="m5.7 7.9 2.6 1.1"/>
        <path d="m20.3 7.9-2.6 1.1"/>
      </g>
    </g>
  </symbol>
</svg>
