# PR checks — the "build ✓" row on the Darn PR card.
# Darn reads these as GitHub check runs on the fix commit, so the job names
# below ARE product copy: keep them short and lowercase.
# Three independent fast jobs; whole workflow targets ~2-3 minutes.

name: pr-checks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  web:
    name: web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: install
        run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: build
        run: npm run build

  server:
    name: server
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            server/requirements.txt
            server/requirements-dev.txt
      - name: install
        run: pip install -r requirements-dev.txt
      - name: pytest
        run: pytest

  shop:
    name: shop
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: shop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: shop/requirements.txt
      - name: install
        run: pip install -r requirements.txt pytest
      - name: pytest
        run: pytest
